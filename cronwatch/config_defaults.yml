# cronwatch default configuration
# All values here act as fallbacks when the user config omits a key.

log_dir: ~/.cronwatch/logs

email:
  enabled: false
  smtp_host: localhost
  smtp_port: 25
  use_tls: false
  from_addr: cronwatch@localhost
  to_addrs: []
  subject_prefix: "[cronwatch]"

slack:
  enabled: false
  webhook_url: ""
  channel: ""
  username: cronwatch
  icon_emoji: ":alarm_clock:"

retry:
  attempts: 1
  delay: 0
  backoff: 1.0

timeout:
  seconds: 0

truncate:
  max_lines: 200
  max_bytes: 65536

redact:
  patterns: []

ratelimit:
  max_runs: 0
  window: 3600

deadman:
  seconds: 0

digest:
  enabled: false
  interval: 86400

environ:
  vars: {}
  clear_keys: []

jitter:
  seconds: 0

concurrency:
  max_running: 0

quota:
  max_runs: 0
  window: 86400

throttle:
  interval: 0

window:
  windows: []
