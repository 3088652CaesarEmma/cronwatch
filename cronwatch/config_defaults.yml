# cronwatch default configuration

log_dir: ~/.cronwatch/logs

email:
  enabled: false
  smtp_host: localhost
  smtp_port: 25
  use_tls: false
  from_addr: cronwatch@localhost
  to_addrs: []

slack:
  enabled: false
  webhook_url: ""

retry:
  attempts: 1
  delay: 0
  backoff: 1.0

timeout:
  seconds: 0

ratelimit:
  window_seconds: 0

output:
  truncate:
    max_lines: 500
    max_bytes: 102400
  redact:
    patterns: []
