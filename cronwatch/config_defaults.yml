log_dir: ~/.cronwatch/logs
history_file: ~/.cronwatch/history.jsonl

email:
  enabled: false
  smtp_host: localhost
  smtp_port: 25
  use_tls: false
  from_addr: cronwatch@localhost
  to_addrs: []

slack:
  enabled: false
  webhook_url: ""

defaults:
  retry_attempts: 1
  retry_delay: 5.0
  retry_backoff: 1.0
  timeout: null
  notify_on: failure
