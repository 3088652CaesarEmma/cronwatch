log_dir: ~/.cronwatch/logs
max_log_age_days: 30
notify_on_success: false

email:
  enabled: false
  smtp_host: localhost
  smtp_port: 25
  use_tls: false
  from_addr: cronwatch@localhost
  to_addrs: []
  subject_prefix: "[cronwatch]"

slack:
  enabled: false
  webhook_url: ""
  channel: "#alerts"
  username: cronwatch

alert:
  cooldown_seconds: 3600
  enabled: true
