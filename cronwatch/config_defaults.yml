# cronwatch default configuration

log_dir: ~/.cronwatch/logs

email:
  enabled: false
  smtp_host: localhost
  smtp_port: 25
  use_tls: false
  from_addr: cronwatch@localhost
  to_addrs: []

slack:
  enabled: false
  webhook_url: ""
  channel: "#alerts"

retry:
  attempts: 1
  delay: 0
  backoff: 1.0

timeout:
  seconds: 0

ratelimit:
  max_per_hour: 0

throttle:
  min_interval: 0

truncate:
  max_lines: 100
  max_bytes: 10240

redact:
  patterns: []

jitter:
  max_seconds: 0

deadman:
  interval: 0

digest:
  interval: 0
